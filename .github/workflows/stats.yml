name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # Updates automatically every day at midnight
  workflow_dispatch: # Lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=CokieMiner&show_icons=true&theme=tokyonight&hide_border=true&count_private=true
          token: ${{ secrets.PAT_FOR_STATS }} # Uses the token you just created
          
      - name: Generate Top Langs Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=CokieMiner&layout=compact&theme=tokyonight&hide_border=true&langs_count=5
          token: ${{ secrets.GITHUB_TOKEN }} # Default token is fine for top langs
